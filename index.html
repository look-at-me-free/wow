<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Archive Reader</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rampart+One&family=Rubik+Broken+Fax&display=swap" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Handjet:wght@100..900&family=Rampart+One&family=Rubik+Broken+Fax&display=swap" rel="stylesheet">

<script async src="https://a.magsrv.com/ad-provider.js"></script>
<script>window.AdProvider = window.AdProvider || [];</script>

<style>
:root{
 --bg:#07080d;
 --ink:#ffffff;
 --muted:rgba(255,255,255,.65);
 --stroke:rgba(255,255,255,.14);
 --panel:rgba(255,255,255,.05);
 --shadow:0 20px 60px rgba(0,0,0,.55);

 --railW:300px;
 --readerMin:640px;
 --readerIdeal:720px;
 --readerMax:760px;
 --layoutGap:20px;
}

*{box-sizing:border-box}

html,body{
 margin:0;
 background:var(--bg);
 color:var(--ink);
 font-family:'Handjet', system-ui, sans-serif;
}

body{
 background:
 radial-gradient(900px 500px at 14% 0%, rgba(255,255,255,.06), transparent 60%),
 radial-gradient(800px 520px at 86% 12%, rgba(255,255,255,.04), transparent 55%),
 linear-gradient(180deg,#0a0b10 0%,#07080d 100%);
}

h1{
 font-family:'Rampart One', cursive;
 letter-spacing:1px;
 margin:0;
 font-size:clamp(2.4rem,5vw,3.6rem);
}

.subtitle{
 font-family:'Rubik Broken Fax', cursive;
 color:var(--muted);
 font-size:1.2rem;
 margin-top:8px;
}

.hero{
 text-align:center;
 padding:32px 16px 18px;
 border-bottom:1px solid var(--stroke);
}

.searchBar{
 margin:18px auto 8px;
 max-width:520px;
}

.searchBar input{
 width:100%;
 padding:10px 16px;
 border-radius:999px;
 border:1px solid var(--stroke);
 background:rgba(255,255,255,.08);
 color:white;
 font-size:16px;
 outline:none;
}

.traversal-bar{
 display:flex;
 flex-wrap:wrap;
 justify-content:center;
 gap:10px;
 padding:14px;
 margin:20px auto;
 max-width:900px;
}

.traversal-pill{
 border:1px solid rgba(255,255,255,.22);
 background:white;
 color:black;
 padding:8px 18px;
 border-radius:999px;
 font-weight:600;
 cursor:pointer;
 font-family:'Handjet';
 transition:.15s;
}

.traversal-pill:hover{
 transform:translateY(-2px);
 box-shadow:0 6px 18px rgba(0,0,0,.3);
}

.layout{
 max-width:calc((var(--railW)*2) + var(--readerMax) + 80px);
 margin:0 auto;
 padding:18px;
 display:grid;
 grid-template-columns:var(--railW) minmax(var(--readerMin), clamp(var(--readerMin),46vw,var(--readerIdeal))) var(--railW);
 gap:var(--layoutGap);
 justify-content:center;
 align-items:start;
}

.reader{
 width:100%;
 max-width:var(--readerMax);
 margin:0 auto;
}

.image-wrap{
 background:#000;
 border-radius:16px;
 overflow:hidden;
 margin-bottom:10px;
}

.image-wrap img{
 width:100%;
 display:block;
}

.rail{
 width:var(--railW);
 min-width:var(--railW);
 position:sticky;
 top:16px;
}

.rail-stack{
 display:flex;
 flex-direction:column;
 gap:12px;
}

.slot{
 min-height:250px;
 border-radius:16px;
 border:1px solid var(--stroke);
 background:linear-gradient(180deg,var(--panel),rgba(255,255,255,.02));
 box-shadow:var(--shadow);
 display:flex;
 align-items:center;
 justify-content:center;
}

.top-banner-shell{
 max-width:820px;
 margin:18px auto 10px;
}

.top-banner-bar{
 min-height:110px;
 border-radius:20px;
 border:1px solid var(--stroke);
 display:flex;
 align-items:center;
 justify-content:center;
}

#progressBar{
 position:fixed;
 top:0;
 left:0;
 height:4px;
 width:0%;
 background:white;
 z-index:3000;
}

#stickyCluster{
 position:fixed;
 right:20px;
 bottom:20px;
 display:flex;
 flex-direction:column;
 gap:8px;
 padding:10px;
 background:rgba(15,15,18,.85);
 backdrop-filter:blur(8px);
 border-radius:14px;
 border:1px solid rgba(255,255,255,.15);
}

.stickyBtn{
 border:1px solid rgba(255,255,255,.18);
 background:rgba(255,255,255,.08);
 color:white;
 padding:8px 12px;
 border-radius:999px;
 cursor:pointer;
 font-family:'Handjet';
}

.stickyBtn:hover{
 background:rgba(255,255,255,.2);
}

@media(max-width:1120px){
 .layout{
  grid-template-columns:1fr;
 }

 .rail{
  width:100%;
  position:relative;
 }

 .rail-stack{
  display:grid;
  grid-template-columns:repeat(3,1fr);
 }
}

</style>
</head>

<body>

<div id="progressBar"></div>

<header class="hero">
<h1 id="workTitle">Archive Reader</h1>
<div class="subtitle">Scroll. Read. Continue.</div>

<div class="searchBar">
<input type="text" placeholder="Search chapters...">
</div>

<nav class="traversal-bar" id="topTraversal"></nav>

</header>

<div class="top-banner-shell">
<div class="top-banner-bar">
<div class="exo-slot" id="topBannerSlot"></div>
</div>
</div>

<div class="layout">

<aside class="rail">
<div class="rail-stack">
<div class="slot exo-slot" id="leftRailSlot1"></div>
<div class="slot exo-slot" id="leftRailSlot2"></div>
<div class="slot exo-slot" id="leftRailSlot3"></div>
<div class="slot exo-slot" id="leftRailSlot4"></div>
<div class="slot exo-slot" id="leftRailSlot5"></div>
<div class="slot exo-slot" id="leftRailSlot6"></div>
</div>
</aside>

<main class="reader" id="reader"></main>

<aside class="rail">
<div class="rail-stack">
<div class="slot exo-slot" id="rightRailSlot1"></div>
<div class="slot exo-slot" id="rightRailSlot2"></div>
<div class="slot exo-slot" id="rightRailSlot3"></div>
<div class="slot exo-slot" id="rightRailSlot4"></div>
<div class="slot exo-slot" id="rightRailSlot5"></div>
<div class="slot exo-slot" id="rightRailSlot6"></div>
</div>
</aside>

</div>

<div id="bottomTraversal" class="traversal-bar"></div>

<div id="stickyCluster">
<button class="stickyBtn" id="scrollTopBtn">Search Bar</button>
<button class="stickyBtn" id="scrollBottomBtn">Last Page | Traversal</button>
</div>

<script>

window.addEventListener("scroll",()=>{
 const scrollTop=document.documentElement.scrollTop;
 const docHeight=document.documentElement.scrollHeight-document.documentElement.clientHeight;
 const progress=(scrollTop/docHeight)*100;
 document.getElementById("progressBar").style.width=progress+"%";

 if(progress>95){
  document.getElementById("scrollBottomBtn").style.boxShadow="0 0 15px rgba(255,255,255,.35)";
 }

});

 document.getElementById("scrollTopBtn").onclick=()=>{
  window.scrollTo({top:0,behavior:"smooth"});
 }

 document.getElementById("scrollBottomBtn").onclick=()=>{
  window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});
 }

</script>

<script defer src="index.js"></script>

</body>
</html>
